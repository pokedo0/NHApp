name: Sync Upstream & Auto Build Release

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_new_release: ${{ steps.check.outputs.has_new_release }}
      upstream_tag: ${{ steps.check.outputs.upstream_tag }}
    steps:
      - name: Check upstream latest release
        id: check
        run: |
          UPSTREAM_TAG=$(curl -sf "https://api.github.com/repos/e18lab/NHApp/releases/latest" | jq -r '.tag_name')
          OUR_TAG=$(curl -sf "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r '.tag_name' || echo "null")
          
          if [ "$UPSTREAM_TAG" != "null" ] && [ "$UPSTREAM_TAG" != "$OUR_TAG" ]; then
            echo "has_new_release=true" >> $GITHUB_OUTPUT
            echo "upstream_tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
            
            echo "🔄 Syncing fork with upstream..."
            HTTP_CODE=$(curl -s -o /tmp/sync_response.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/merge-upstream" \
              -d '{"branch":"main"}')

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "409" ]; then
              echo "✅ Fork synced successfully"
            else
              echo "❌ Sync failed with HTTP $HTTP_CODE"
              exit 1
            fi
          else
            echo "has_new_release=false" >> $GITHUB_OUTPUT
            echo "✅ Already up to date."
          fi

  build-release:
    needs: check-and-sync
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.check-and-sync.outputs.has_new_release == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/settings.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prebuild Android
        run: npx expo prebuild --platform android

      - name: Cache Android Debug Keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-permanent

      - name: Ensure Keystore Exists
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            echo "Keystore not found in cache, generating a permanent one..."
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "O=Android, C=US"
          fi

      - name: Build Release APK
        if: success()
        run: |
          cd android
          chmod +x gradlew
          # 编译成原生的 Release 版！彻底移除 Expo Dev 工具！
          ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a,armeabi-v7a --no-daemon --build-cache --parallel

      - name: Sign & Align Release APK
        if: success()
        run: |
          mkdir -p final-apks
          # 拿到刚刚编译出来的未签名发行版安装包
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*-unsigned.apk" -o -name "app-release.apk" | head -n 1)
          
          # 获取系统安装的 Android 签名工具 (zipalign & apksigner)
          BUILD_TOOLS_DIR="$ANDROID_HOME/build-tools/$(ls -1 $ANDROID_HOME/build-tools | sort -r | head -n 1)"
          
          # 先进行应用优化对齐
          $BUILD_TOOLS_DIR/zipalign -v -p 4 "$APK_PATH" final-apks/NHApp-Release-ARM-aligned.apk
          
          # 【这才是封神的一步】：使用我们的万年缓存且不会变的测试密钥，去盖章并激活正式版的发行层 APK！
          $BUILD_TOOLS_DIR/apksigner sign --ks ~/.android/debug.keystore \
            --ks-pass pass:android --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out final-apks/NHApp-Release-ARM.apk \
            final-apks/NHApp-Release-ARM-aligned.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: NHApp-Release-ARM-APK
          path: final-apks/NHApp-Release-ARM.apk

      - name: Generate Release Tag
        id: tag
        run: |
          if [ "${{ needs.check-and-sync.outputs.has_new_release }}" == "true" ]; then
            echo "tag_name=${{ needs.check-and-sync.outputs.upstream_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=dev-$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: "Auto Build: ${{ steps.tag.outputs.tag_name }}"
          body: "🚀 自动同步与构建的正式版本（无内嵌 Expo-Dev-Client 工具包）。\n\n📌 包含 ARM64 架构，免去多余模拟器架构以极速出包并精简体积。\n⚠️ 虽然内含功能为 Release 模式（流畅、无开发工具面板），但使用了固定测试签名进行封装，**支持长期直接覆盖升级使用**！"
          files: final-apks/NHApp-Release-ARM.apk
