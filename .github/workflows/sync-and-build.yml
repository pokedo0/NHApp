name: Sync Upstream & Auto Build Debug

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_new_release: ${{ steps.check.outputs.has_new_release }}
      upstream_tag: ${{ steps.check.outputs.upstream_tag }}
    steps:
      - name: Check upstream latest release
        id: check
        run: |
          UPSTREAM_TAG=$(curl -sf "https://api.github.com/repos/e18lab/NHApp/releases/latest" | jq -r '.tag_name')
          OUR_TAG=$(curl -sf "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r '.tag_name' || echo "null")
          
          if [ "$UPSTREAM_TAG" != "null" ] && [ "$UPSTREAM_TAG" != "$OUR_TAG" ]; then
            echo "has_new_release=true" >> $GITHUB_OUTPUT
            echo "upstream_tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
            
            echo "🔄 Syncing fork with upstream..."
            HTTP_CODE=$(curl -s -o /tmp/sync_response.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/merge-upstream" \
              -d '{"branch":"main"}')

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "409" ]; then
              echo "✅ Fork synced successfully"
            else
              echo "❌ Sync failed with HTTP $HTTP_CODE"
              exit 1
            fi
          else
            echo "has_new_release=false" >> $GITHUB_OUTPUT
            echo "✅ Already up to date."
          fi

  build-debug:
    needs: check-and-sync
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.check-and-sync.outputs.has_new_release == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写权限，以便发布 Release
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      # 优化1：使用 npm ci 替代 install，提升速度和依赖解析稳定性
      - name: Install Dependencies
        run: npm ci

      # 优化2：完整的 Gradle 缓存（加快下载依赖与原生构建准备）
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/settings.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prebuild Android
        run: npx expo prebuild --platform android

      - name: Cache Android Debug Keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-permanent

      # 优化3 & 优化4：
      #   1) 传入 -PreactNativeArchitectures=arm64-v8a,armeabi-v7a 来忽略 x86 架构的庞大 C++ 编译耗时。
      #   2) 加上 --build-cache 和 --parallel 缩短任务链时间。
      - name: Build Debug ARM Package
        if: success()
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -PreactNativeArchitectures=arm64-v8a,armeabi-v7a --no-daemon --build-cache --parallel

      # 统一提取并重命名 APK，方便下载页直接辨认
      - name: Rename Output APK
        if: success()
        run: |
          mkdir -p final-apks
          # 因为我们限制了只打 ARM 架构，且默认不拆分 APK，所以它产出的就是一个轻量级的涵盖最新手机架构的安装包
          cp android/app/build/outputs/apk/debug/app-debug.apk final-apks/NHApp-Debug-ARM.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: NHApp-Debug-ARM-APK
          path: final-apks/NHApp-Debug-ARM.apk

      # 优化5：新增自动发布到 Github Releases 功能 (只在真有更新或手动触发时打 Tag 和 Release)
      - name: Generate Release Tag
        id: tag
        run: |
          # 如果是因为上游更新触发的，沿用上游 Tag名加 -debug
          if [ "${{ needs.check-and-sync.outputs.has_new_release }}" == "true" ]; then
            echo "tag_name=${{ needs.check-and-sync.outputs.upstream_tag }}-debug" >> $GITHUB_OUTPUT
          else
            echo "tag_name=dev-$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: "Auto Build: ${{ steps.tag.outputs.tag_name }}"
          body: "🚀 自动同步与构建的非官方自编译 Debug 版本 (由 GitHub Action 自动生成)。\n\n📌 包含 ARM64 架构，免去多余模拟器架构以极速出包并精简体积。\n⚠️ 请注意因为缓存了同一套测试密钥，这可以用于在原有自编译版本上的直接覆盖升级。"
          files: final-apks/NHApp-Debug-ARM.apk
